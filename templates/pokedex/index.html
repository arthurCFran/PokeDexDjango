<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Pokedex</title>
</head>
<body>
    <h1>Bem vindo à sua Pokedex!</h1>

    <table class="table" >
        <thead>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Nível</th>
        </thead>
        <tbody>
            {% for pokemon in pokemons %}
                <tr>
                    <td>{{ pokemon.name }}</td>
                    <td>{{ pokemon.type }}</td>
                    <td>{{ pokemon.description }}</td>
                    <td>{{ pokemon.level }}</td>
                    <td><a href="{% url 'pokedex:remover' pokemon.id %}">Remover</a></td>
                    <td><a href="{% url 'pokedex:editar' pokemon.id %}">Editar</a></td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'pokedex:adicionar' %}">Adicionar Pokémon</a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
